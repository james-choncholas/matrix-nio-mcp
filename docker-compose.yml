services:
  nio-mcp:
    build: .
    env_file: .env
    volumes:
      - nio_store:/data/nio_store
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    # MCP stdio is consumed by an MCP host (e.g. Claude Desktop) via docker exec
    # or by wrapping with `docker run -i`. The SSE webhook endpoint is on :8000.
    stdin_open: true
    tty: false

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  nio_store:
  qdrant_data:
