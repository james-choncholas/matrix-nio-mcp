services:
  nio-mcp:
    build: .
    env_file: .env
    volumes:
      - nio_store:/data/nio_store
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    # MCP HTTP transport on :8000/mcp. Matrix event SSE stream on :8000/events.

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  nio_store:
  qdrant_data:
