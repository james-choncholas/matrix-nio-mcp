name: container

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Dynamically set registry and repo name variables
      - name: Prepare Registry Variables
        id: prep
        run: |
          SERVER_URL="${{ github.server_url }}"
          
          # 1. Determine the registry domain
          if [[ "$SERVER_URL" == *"github.com"* ]]; then
            REGISTRY="ghcr.io"
          else
            # For Gitea, strip "http://" or "https://" from the server URL
            REGISTRY=$(echo "$SERVER_URL" | sed -E 's|^https?://||')
          fi
          
          # 2. Force repository path to lowercase (Docker requirement)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Save to runner environment
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV
          echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically maps to Gitea's token too

      - name: Echo the tag
        run: echo "${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ github.ref_name }}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:sha-${{ github.sha }}